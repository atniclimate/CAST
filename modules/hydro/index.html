<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EWM Hydro — proof of life</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      #map {
        position: absolute;
        inset: 0;
      }
      #panel {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 8px;
        font:
          13px/1.4 system-ui,
          sans-serif;
      }
      #status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(20, 24, 28, 0.85);
        color: #fff;
        cursor: pointer;
        user-select: none;
      }
      #status-pill .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #888;
      }
      #layer-toggle {
        align-self: flex-start;
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        background: rgba(20, 24, 28, 0.85);
        color: #fff;
        cursor: pointer;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="panel">
      <div id="status-pill" title="Click to preview the five status states">
        <span class="dot"></span><span class="label">loading…</span>
      </div>
      <button id="layer-toggle" type="button">Hide demo gauges</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
