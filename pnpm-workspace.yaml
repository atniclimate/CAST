packages:
  - packages/*
  - modules/*
  - apps/*

# esbuild's postinstall installs its platform binary; required for Vite.
allowBuilds:
  esbuild: true

# Single source of truth for shared dependency versions.
# Workspace packages reference these with "catalog:".
catalog:
  typescript: ^7.0.2
  react: ^19.2.0
  react-dom: ^19.2.0
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.0
  # CAP-CP XML conformance decoding (ingest-eccc). Pinned choice per the
  # ingestion architecture design: pure JS, browser+node, DTD/external
  # entities not processed.
  fast-xml-parser: ^5.10.1
  vitest: ^3.2.4
  vite: ^7.1.0
  maplibre-gl: ^5.8.0
  '@types/geojson': ^7946.0.16
